name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Cache Docker layers
        uses: actions/cache@v5.0.5
        with:
          path: /tmp/.buildx-cache
          key: buildx-${{ hashFiles('Dockerfile') }}
          restore-keys: |
            buildx-

      - name: Prepare Maven cache directory
        run: |
          mkdir -p ~/.m2 && tree $PWD/

      - name: Cache Clojure Maven repository
        uses: actions/cache@v5.0.5
        with:
          path: ~/.m2
          key: clojure-m2-cache-${{ hashFiles('deps.edn') }}
          restore-keys: |
            clojure-m2-cache-

      - name: Check Clojure cache before tests
        run: |
          if find ~/.m2 -path '*org/clojure/clojure/1.12.5/clojure-1.12.5.pom' -print -quit | grep -q .; then
            echo "org/clojure dependency already cached"
          else
            echo "org/clojure dependency missing from cache"
          fi

      - name: Build CI image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          target: clojure
          load: true
          tags: jfr-merger-ci:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move Docker layer cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Run tests
        run: |
          docker run --rm \
            -v $HOME/.m2:/root/.m2 \
            -v $PWD:/tmp/sources \
            jfr-merger-ci:latest \
            /bin/bash -c "cp -r /tmp/sources/* /app/ && /app/clojure/bin/clojure -M:test"

      - name: Check Clojure cache after build
        run: |
          if find ~/.m2 -path '*org/clojure/clojure/1.12.5/clojure-1.12.5.pom' -print -quit | grep -q .; then
            echo "org/clojure dependency cached"
          else
            echo "org/clojure dependency still missing"
            exit 1
          fi
